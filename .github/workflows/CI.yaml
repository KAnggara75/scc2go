name: Go CI/CD with Semantic Versioning

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/CI.yaml"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"

env:
  GOTOOLCHAIN: local

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    permissions:
      contents: read
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25.7", "1.26"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6.2.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests (matrix)
        run: |
          if [ "${{ matrix.go-version }}" = "1.25.7" ]; then
            echo "Running race detector (latest Go only)..."
            go test -v -race ./...

            echo "Running coverage (separate from race)..."
            go test -v -coverprofile=coverage.out -covermode=atomic ./...
          else
            echo "Running standard tests..."
            go test -v ./...
          fi

      - name: Upload results to Codecov
        if: matrix.go-version == '1.25.7'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.26.0", "1.25.7"]
    name: Build ${{ matrix.go-version == '1.26.0' && '(latest)' || '1.25.7' }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - name: Install goimports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          export PATH="$HOME/go/bin:$PATH"

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Download dependencies
        run: go mod download

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  create-tag:
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [test, build]
    env:
      TZ: Asia/Jakarta
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Hitung versi tag (WIB)
        id: ver
        run: |
          sudo ln -sf /usr/share/zoneinfo/$TZ /etc/localtime
          yy=$(date +%y)
          m=$(date +%-m)
          d=$(date +%-d)
          HH=$(date +%H)
          MM=$(date +%M)

          tag="v0.${yy}.${m}-${d}${HH}${MM}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Tag yang akan dibuat: $tag"

      - name: Cek apakah tag sudah ada
        id: check
        run: |
          git fetch --tags --quiet
          if git rev-parse -q --verify "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag sudah ada, tidak perlu membuat ulang."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Buat dan push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Auto tag $tag"
          git push origin "$tag"
